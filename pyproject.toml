[tool.black]
line-length = 88
target-version = ["py39"]

[tool.isort]
profile = "black"
py_version = 39
src_paths = ["src/fronatend"]

[tool.mypy]
python_version = "3.9"
warn_unused_configs = true
check_untyped_defs = true
mypy_path = ["src/fronatend"]
exclude = ["^src/engine/"]

[[tool.mypy.overrides]]
module = ["qasync"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["src/fronatend"]
